<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        .curved-text span {
            display: inline-block;
            transform-origin: bottom center;
        }

        .char1 {
            transform: rotate(-30deg) translateY(20px);
        }

        .char2 {
            transform: rotate(-20deg) translateY(15px);
        }

        .char3 {
            transform: rotate(-10deg) translateY(10px);
        }

        .char4 {
            transform: rotate(0deg);
        }

        .char5 {
            transform: rotate(10deg) translateY(10px);
        }

        .char6 {
            transform: rotate(20deg) translateY(15px);
        }

        .char7 {
            transform: rotate(30deg) translateY(20px);
        }
    </style>
</head>

<body>
    <div class="curved-text">
        <span class="char1">C</span>
        <span class="char2">U</span>
        <span class="char3">R</span>
        <span class="char4">V</span>
        <span class="char5">E</span>
        <span class="char6">D</span>
        <span class="char7">!</span>
    </div>

</body>

</html>
